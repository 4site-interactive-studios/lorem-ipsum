<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator</title>
<style>
/* ---- Apply theme before paint to avoid flash ---- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --col-bg:      #f5f2fd;
  --text-on-col: #000000;
  --text-muted:  rgba(0,0,0,0.4);
  --border-col:  #000000;
  --line-color:  #000000;
  --overlay-bg:  rgba(245,242,253,0.55);
  --panel-bg:    #ffffff;
  --panel-border:#000000;
  --panel-text:  #000000;
  --panel-muted: #444444;
  --progress-bg: #e0d8f8;
  --prog-fill:   #000000;
  --footer-sep:  #000000;
  --shadow:      rgba(0,0,0,0.10);
}

@media (prefers-color-scheme: dark) {
  :root {
    --col-bg:      #000000;
    --text-on-col: #ffffff;
    --text-muted:  rgba(255,255,255,0.4);
    --border-col:  #ffffff;
    --line-color:  #ffffff;
    --overlay-bg:  rgba(0,0,0,0.55);
    --panel-bg:    #000000;
    --panel-border:#ffffff;
    --panel-text:  #ffffff;
    --panel-muted: #bbbbbb;
    --panel-body:  #cccccc;
    --progress-bg: #333333;
    --prog-fill:   #ffffff;
    --footer-sep:  #333333;
    --shadow:      rgba(255,255,255,0.06);
  }
}

html, body {
  height: 100%;
  font-family: Georgia, 'Times New Roman', serif;
  overflow: hidden;
  background: var(--col-bg);
}

/* ---- 4-column layout ---- */
.app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

.col {
  flex: 1;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  user-select: none;
  cursor: none;
  background: var(--col-bg);
  transition: background 0.2s ease;
}

.col:nth-child(1) { border-right: 1px solid var(--border-col); }
.col:nth-child(2) { border-right: 1px solid var(--border-col); }
.col:nth-child(3) { border-right: 1px solid var(--border-col); }

/* Custom cursor dot */
.cursor-dot {
  position: fixed;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-on-col);
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  opacity: 0;
}

/* Horizontal line that follows mouse Y */
.col-line {
  position: absolute;
  left: 0;
  width: 100%;
  height: 1px;
  background: var(--line-color);
  top: -2px;
  pointer-events: none;
  z-index: 3;
  opacity: 0;
  transition: opacity 0.1s ease;
}
.col:hover .col-line { opacity: 1; }

/* Label at top */
.col-label {
  position: relative;
  z-index: 2;
  padding-top: 28px;
  font-family: 'Courier New', Courier, monospace;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-on-col);
  pointer-events: none;
  font-weight: 700;
}

/* Static divider under label */
.col-divider {
  position: absolute;
  top: 62px;
  left: 0;
  width: 100%;
  height: 1px;
  background: var(--border-col);
  opacity: 0.12;
  pointer-events: none;
  z-index: 2;
}

/* Horizontal line that tracks mouse Y */
.col-line {
  position: absolute;
  left: 0;
  width: 100%;
  height: 1px;
  background: var(--line-color);
  top: 0;
  pointer-events: none;
  z-index: 4;
  opacity: 0;
}
.col:hover .col-line { opacity: 1; }

/* Number + unit inline — follows the hover line */
.col-value {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 50%;
  z-index: 2;
  display: flex;
  align-items: baseline;
  gap: 0.3em;
  opacity: 0;
  pointer-events: none;
  white-space: nowrap;
}
.col:hover .col-value { opacity: 1; }

.col-number {
  font-family: 'Courier New', Courier, monospace;
  font-weight: 700;
  color: var(--text-on-col);
}

.col-unit {
  font-family: 'Courier New', Courier, monospace;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-on-col);
}





/* ---- Overlay ---- */
.overlay {
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  backdrop-filter: blur(10px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s ease;
}
.overlay.visible {
  opacity: 1;
  pointer-events: all;
}

.summary {
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  width: min(560px, 88vw);
  position: relative;
  overflow: hidden;
  animation: riseUp 0.22s cubic-bezier(0.16,1,0.3,1) both;
  box-shadow: 0 24px 64px var(--shadow);
}
@keyframes riseUp {
  from { transform: translateY(16px) scale(0.98); opacity: 0; }
  to   { transform: translateY(0) scale(1); opacity: 1; }
}

.progress-track {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--progress-bg);
  z-index: 10;
}
.progress-fill {
  height: 100%;
  background: var(--prog-fill);
  width: 100%;
  transform-origin: left center;
  will-change: transform;
}

.summary-inner {
  padding: 40px 40px 28px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
}

.stat-block {
  padding: 0 24px 0 0;
  border-right: 1px solid var(--panel-border);
  margin-right: 24px;
}
.stat-block:last-child {
  border-right: none;
  margin-right: 0;
  padding-right: 0;
}

.stat-num {
  font-family: 'Courier New', Courier, monospace;
  font-size: clamp(36px, 5vw, 64px);
  font-weight: 700;
  line-height: 1;
  color: var(--panel-text);
  display: block;
}

.stat-lbl {
  font-family: 'Courier New', Courier, monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--panel-text);
  display: block;
  font-weight: 700;
  margin-top: 8px;
}

.overlay-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.overlay-heading {
  font-family: 'Courier New', Courier, monospace;
  font-size: clamp(18px, 2.5vw, 28px);
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #2a9a4a;
  text-align: center;
}
</style>
</head>
<body>

<div class="cursor-dot" id="cursor-dot"></div>

<div class="app" role="main">

  <div class="col" data-mode="characters" data-min="50" data-max="1000" data-val="0" role="button" tabindex="0" aria-label="Characters column. Hover down to set amount, click to generate.">
    <span class="col-label">Characters</span>
    <div class="col-divider"></div>
    <div class="col-line"></div>
    <div class="col-value"><span class="col-number" aria-live="polite">—</span><span class="col-unit">chars</span></div>
  </div>

  <div class="col" data-mode="words" data-min="5" data-max="200" data-val="0" role="button" tabindex="0" aria-label="Words column. Hover down to set amount, click to generate.">
    <span class="col-label">Words</span>
    <div class="col-divider"></div>
    <div class="col-line"></div>
    <div class="col-value"><span class="col-number" aria-live="polite">—</span><span class="col-unit">words</span></div>
  </div>

  <div class="col" data-mode="sentences" data-min="1" data-max="20" data-val="0" role="button" tabindex="0" aria-label="Sentences column. Hover down to set amount, click to generate.">
    <span class="col-label">Sentences</span>
    <div class="col-divider"></div>
    <div class="col-line"></div>
    <div class="col-value"><span class="col-number" aria-live="polite">—</span><span class="col-unit">sentences</span></div>
  </div>

  <div class="col" data-mode="paragraphs" data-min="1" data-max="10" data-val="0" role="button" tabindex="0" aria-label="Paragraphs column. Hover down to set amount, click to generate.">
    <span class="col-label">Paragraphs</span>
    <div class="col-divider"></div>
    <div class="col-line"></div>
    <div class="col-value"><span class="col-number" aria-live="polite">—</span><span class="col-unit">paragraphs</span></div>
  </div>

</div>

<!-- Summary overlay -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="Generated text">
  <div class="overlay-inner">
    <div class="overlay-heading">Copied to clipboard</div>
    <div class="summary" id="summary">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="summary-inner">
        <div class="stat-block">
          <span class="stat-num" id="stat-n">—</span>
          <span class="stat-lbl" id="stat-mode">—</span>
        </div>
        <div class="stat-block">
          <span class="stat-num" id="stat-words">—</span>
          <span class="stat-lbl">Words</span>
        </div>
        <div class="stat-block">
          <span class="stat-num" id="stat-chars">—</span>
          <span class="stat-lbl">Characters</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>

// ---- Corpus ----
const W = [
  "lorem","ipsum","dolor","sit","amet","consectetur","adipiscing","elit","sed","do",
  "eiusmod","tempor","incididunt","ut","labore","et","dolore","magna","aliqua","enim",
  "ad","minim","veniam","quis","nostrud","exercitation","ullamco","laboris","nisi",
  "aliquip","ex","ea","commodo","consequat","duis","aute","irure","in","reprehenderit",
  "voluptate","velit","esse","cillum","eu","fugiat","nulla","pariatur","excepteur","sint",
  "occaecat","cupidatat","non","proident","sunt","culpa","qui","officia","deserunt",
  "mollit","anim","id","est","laborum","perspiciatis","unde","omnis","iste","natus",
  "error","voluptatem","accusantium","doloremque","laudantium","totam","rem","aperiam",
  "eaque","ipsa","quae","ab","illo","inventore","veritatis","quasi","architecto","beatae",
  "vitae","dicta","explicabo","nemo","ipsam","quia","voluptas","aspernatur","aut","odit",
  "fugit","consequuntur","magni","dolores","eos","ratione","sequi","nesciunt","neque",
  "porro","quisquam","dolorem","adipisci","numquam","eius","modi","tempora","incidunt",
  "quaerat","soluta","nobis","eligendi","optio","cumque","nihil","impedit","minus",
  "quod","maxime","placeat","facere","possimus","assumenda","repellendus","temporibus",
  "autem","quibusdam","officiis","debitis","rerum","necessitatibus","saepe","eveniet",
  "reiciendis","voluptates","maiores","alias","perferendis","doloribus","asperiores",
  "repellat","perspiciatis","aperiam","inventore","veritatis","architecto","molestiae"
];

const rw  = () => W[Math.floor(Math.random() * W.length)];
const rnd = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

function sentence() {
  const n = rnd(6,18), words = Array.from({length:n}, rw);
  if (n > 9 && Math.random() > 0.4) words[rnd(3, Math.floor(n/2))] += ',';
  return cap(words.join(' ')) + '.';
}
function paragraph() { return Array.from({length:rnd(3,7)}, sentence).join(' '); }
function genChars(n)  { let s=''; while(s.length<n) s+=(s?' ':'')+rw(); return cap(s.slice(0,n)); }
function genWords(n)  { return cap(Array.from({length:n},rw).join(' '))+'.'; }
function genSents(n)  { return Array.from({length:n},sentence).join(' '); }
function genParas(n)  { return Array.from({length:n},paragraph).join('\n\n'); }

function generate(mode, n) {
  if (mode==='characters') return genChars(n);
  if (mode==='words')      return genWords(n);
  if (mode==='sentences')  return genSents(n);
  if (mode==='paragraphs') return genParas(n);
}

// ---- Cursor dot ----
const dot = document.getElementById('cursor-dot');
document.addEventListener('mousemove', e => {
  dot.style.left = e.clientX + 'px';
  dot.style.top  = e.clientY + 'px';
});

// ---- Uniform font sizing ----
// Measures the widest possible string for each column at a known size,
// takes the minimum fit across all four, and applies one shared size.
function calibrateFontSize() {
  const cols     = document.querySelectorAll('.col');
  const colWidth = cols[0].getBoundingClientRect().width;
  const FILL     = 0.72; // target % of column width to fill

  // Worst-case strings for value text and header labels — all measured together
  const maxLabels = ['1000 chars', '200 words', '20 sentences', '10 paragraphs',
                     'Characters', 'Sentences', 'Paragraphs', 'Words'];

  const probe = document.createElement('span');
  probe.style.cssText = [
    'position:absolute',
    'visibility:hidden',
    'white-space:nowrap',
    "font-family:'Courier New',Courier,monospace",
    'font-weight:700',
    'letter-spacing:0.2em',
    'font-size:100px',
  ].join(';');
  document.body.appendChild(probe);

  let size = Infinity;
  maxLabels.forEach(str => {
    probe.textContent = str;
    const w = probe.getBoundingClientRect().width;
    size = Math.min(size, (colWidth * FILL / w) * 100);
  });

  document.body.removeChild(probe);

  const px = Math.max(10, Math.floor(size)) + 'px';
  document.querySelectorAll('.col-number, .col-unit, .col-label').forEach(el => {
    el.style.fontSize = px;
  });
}

window.addEventListener('load', calibrateFontSize);
window.addEventListener('resize', calibrateFontSize);

// ---- Columns ----
document.querySelectorAll('.col').forEach(col => {
  const mode   = col.dataset.mode;
  const min    = parseInt(col.dataset.min);
  const max    = parseInt(col.dataset.max);
  const numEl  = col.querySelector('.col-number');
  const valEl  = col.querySelector('.col-value');
  const lineEl = col.querySelector('.col-line');
  let   val    = 0;
  const LABEL_H = 70;

  function setVal(v) {
    val = Math.max(0, Math.min(max, Math.round(v)));
    numEl.textContent = val === 0 ? '—' : val;
  }

  col.addEventListener('mouseenter', () => { dot.style.opacity = '1'; });

  col.addEventListener('mouseleave', () => {
    dot.style.opacity = '0';
    lineEl.style.opacity = '0';
    valEl.style.opacity  = '0';
    setVal(0);
  });

  col.addEventListener('mousemove', e => {
    const r       = col.getBoundingClientRect();
    const y       = e.clientY - r.top;
    const valH    = valEl.getBoundingClientRect().height;
    const FLIP_THRESHOLD = r.height - valH - 12;
    const hidden  = y <= LABEL_H;
    const above   = y >= FLIP_THRESHOLD;

    lineEl.style.top     = y + 'px';
    lineEl.style.opacity = hidden ? '0' : '1';
    valEl.style.top      = y + 'px';
    valEl.style.opacity  = hidden ? '0' : '1';
    valEl.style.marginTop = above ? (-valH - 12) + 'px' : '6px';

    if (hidden) {
      setVal(0);
    } else {
      const pct = (y - LABEL_H) / (r.height - LABEL_H);
      setVal(min + pct * (max - min));
    }
  });

  col.addEventListener('click', () => {
    if (val < min) return;
    const text = generate(mode, val);
    copyToClipboard(text);
    openSummary(mode, val, text);
  });

  col.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      const mid  = Math.round((min + max) / 2);
      const text = generate(mode, mid);
      copyToClipboard(text);
      openSummary(mode, mid, text);
    }
  });
});

// ---- Clipboard ----
function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    return navigator.clipboard.writeText(text);
  }
  // Fallback for non-secure contexts
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  return Promise.resolve();
}


const overlay  = document.getElementById('overlay');
const summary  = document.getElementById('summary');
const closeBtn = document.getElementById('close-btn');
const progFill = document.getElementById('progress-fill');
const statN    = document.getElementById('stat-n');
const statMode = document.getElementById('stat-mode');
const statWords= document.getElementById('stat-words');
const statChars= document.getElementById('stat-chars');

const DURATION = 3000;
let rafId, startTime, remaining = DURATION;

function openSummary(mode, n, text) {
  const chars = text.length;
  const words = text.split(/\s+/).filter(Boolean).length;

  statN.textContent     = n;
  statMode.textContent  = mode.charAt(0).toUpperCase() + mode.slice(1);
  statWords.textContent = words.toLocaleString();
  statChars.textContent = chars.toLocaleString();
  overlay.classList.add('visible');
  remaining = DURATION;
  progFill.style.transform = 'scaleX(1)';
  startCountdown();
}

function closeOverlay() {
  overlay.classList.remove('visible');
  cancelAnimationFrame(rafId);
  remaining = DURATION;
  progFill.style.transform = 'scaleX(1)';
}

function startCountdown() {
  cancelAnimationFrame(rafId);
  startTime = performance.now();
  tick();
}

function tick(now) {
  now = now || performance.now();
  const left = Math.max(0, remaining - (now - startTime));
  progFill.style.transform = `scaleX(${left / DURATION})`;
  if (left <= 0) { closeOverlay(); return; }
  rafId = requestAnimationFrame(tick);
}

overlay.addEventListener('click', e => { if (e.target === overlay) closeOverlay(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });
</script>
</body>
</html>
